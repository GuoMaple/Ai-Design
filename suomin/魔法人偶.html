<!DOCTYPE html>
<html lang="zh-CN"> <!-- 添加语言属性，提升语义化 -->
<head>
    <meta charset="UTF-8"> <!-- 添加字符编码声明 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 适配移动端 -->
    <title>Img Upscaler 使用说明</title>
    <style>
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif; /* 增加中文字体适配 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .content {
            text-align: center;
            max-width: 600px;
            padding: 40px 30px; /* 调整内边距，视觉更舒适 */
            background-color: white;
            border-radius: 12px; /* 增大圆角，更现代 */
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); /* 优化阴影效果 */
        }
        h1 { /* 添加标题样式 */
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 1.8rem;
        }
        .instruction-list { /* 改用列表展示，结构更清晰 */
            font-size: 1.1rem;
            line-height: 1.8;
            color: #333;
            text-align: left; /* 左对齐更易读 */
            margin: 0 auto;
            max-width: 500px;
        }
        .instruction-list li {
            margin-bottom: 12px; /* 增加列表项间距 */
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>魔法人偶 使用说明</h1>
        <ul class="instruction-list">
            <li>无需登录，网站打开即可直接使用</li>
            <li>可使用右侧预设快速摆放造型</li>
            <li>也可根据需求自行微调参数</li>
            <li>确定姿势角度点击左侧下载导出</li>
            <li>导出的内容可用于 AI 生图参考</li>
        </ul>
    </div>
</body>
</html>
